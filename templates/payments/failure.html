{% extends "base.html" %}
{% block title %}Pago fallido{% endblock %}
{% block content %}
<div class="container py-5 text-center">
  <i class="bi bi-x-circle-fill text-danger" style="font-size:4rem;"></i>
  <h1 class="eco-section-title mt-4">Pago no procesado</h1>

</div>
{% endblock %}
