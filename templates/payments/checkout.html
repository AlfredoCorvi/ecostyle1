{% extends "base.html" %}
{% block title %}Pago{% endblock %}
{% block extra_js %}
<script src="https://sdk.mercadopago.com/js/v2"></script>
<script>
const mp = new MercadoPago("{{ mp_public_key }}", { locale: "es-MX" });
mp.bricks().create("payment", "payment-brick", {
  initialization: { amount: {{ order.total }}, preferenceId: "{{ preference_id }}" },
  customization: { paymentMethods: { creditCard: "all", debitCard: "all" } },
  callbacks: {
    onReady: () => { document.getElementById("loading").style.display = "none"; },
    onError: (e) => console.error(e),
  }
});
</script>
{% endblock %}
{% block content %}
<div class="container py-5" style="max-width:700px;">
  <h1 class="eco-section-title mb-2">Pago seguro</h1>
  <p class="eco-text-muted mb-4">Orden: <strong>{{ order.order_number }}</strong> — Total: <strong>${{ order.total|floatformat:0 }} MXN</strong></p>
  <div id="loading" class="text-center py-4"><div class="spinner-border text-success"></div></div>
  <div id="payment-brick"></div>
</div>
{% endblock %}
