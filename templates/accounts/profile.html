{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Mi Perfil{% endblock %}
{% block content %}
<div class="container py-5" style="max-width:700px;">
  <h1 class="eco-section-title mb-1">Mi Perfil</h1>
  <p class="eco-text-muted mb-4">{{ user.email }}</p>
  <div class="p-4 rounded-3 border">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      {{ form|crispy }}
      <button type="submit" class="btn eco-btn-primary mt-2">Guardar cambios</button>
    </form>
  </div>
</div>
{% endblock %}
